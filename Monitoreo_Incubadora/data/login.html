<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - IoT</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .login-container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        
        .login-container h3 {
            margin-bottom: 20px;
            text-align: center;
        }
        
        .is-invalid {
            border-color: #dc3545;
        }
        
        .invalid-feedback {
            display: none;
            color: #dc3545;
        }
        
        .is-invalid+.invalid-feedback {
            display: block;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h3>Inicio de sesión</h3>
        <form id="loginForm" novalidate>
            <div class="form-group">
                <label for="email">Correo institucional</label>
                <input type="email" class="form-control" id="email" placeholder="usuario@itba.edu.ar">
                <div class="invalid-feedback" id="emailError">Solo se permiten correos @itba.edu.ar</div>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" placeholder="Contraseña">
                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="invalid-feedback" id="passwordError">La contraseña no puede estar vacía</div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
        </form>
    </div>

    <script>
        document.getElementById("togglePassword").addEventListener("click", function() {
            const passwordInput = document.getElementById("password");
            const eyeIcon = document.getElementById("eyeIcon");
            const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);
            eyeIcon.className = type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
        });

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();

            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            let valid = true;

            if (!email.endsWith("@itba.edu.ar")) {
                emailInput.classList.add("is-invalid");
                valid = false;
            } else {
                emailInput.classList.remove("is-invalid");
            }

            if (password === "") {
                passwordInput.classList.add("is-invalid");
                valid = false;
            } else {
                passwordInput.classList.remove("is-invalid");
            }

            if (valid) {
                window.location.href = "home2.html";
            }
        });
    </script>
</body>

</html>
